<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>协和医院APP原型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            overflow-x: hidden;
        }
        
        .prototype-container {
            max-width: 414px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            position: relative;
        }
        
        .screen {
            display: none;
            min-height: 100vh;
            position: relative;
        }
        
        .screen.active {
            display: block;
        }
        
        .screen img {
            width: 100%;
            display: block;
        }
        
        /* 点击热区 */
        .hotspot {
            position: absolute;
            cursor: pointer;
            background: rgba(0, 123, 255, 0.1);
            border: 2px solid rgba(0, 123, 255, 0.3);
            transition: all 0.2s;
        }
        
        .hotspot:hover {
            background: rgba(0, 123, 255, 0.2);
            border-color: rgba(0, 123, 255, 0.5);
        }
        
        /* 导航栏 */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 414px;
            background: #fff;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 1000;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 4px 16px;
            color: #999;
            font-size: 12px;
        }
        
        .nav-item.active {
            color: #1890ff;
        }
        
        .nav-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 2px;
            background: currentColor;
            mask-size: contain;
            mask-repeat: no-repeat;
            mask-position: center;
        }
        
        /* 页面指示器 */
        .page-indicator {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            z-index: 1001;
        }
        
        /* 返回按钮 */
        .back-btn {
            position: absolute;
            top: 44px;
            left: 10px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>

    <script>
        let currentScreen = 1;
        const totalScreens = 23;
        
        function goToScreen(screenNum) {
            if (screenNum < 1 || screenNum > totalScreens) return;
            
            // 隐藏当前页面
            document.getElementById(`screen-${currentScreen}`).classList.remove('active');
            
            // 显示目标页面
            document.getElementById(`screen-${screenNum}`).classList.add('active');
            
            // 更新页面指示器
            currentScreen = screenNum;
            document.getElementById('pageIndicator').textContent = `${currentScreen} / ${totalScreens}`;
            
            // 更新导航栏状态
            updateNavBar(screenNum);
            
            // 滚动到顶部
            window.scrollTo(0, 0);
        }
        
        function updateNavBar(screenNum) {
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));
            
            // 根据页面设置导航高亮
            if (screenNum === 1) navItems[0].classList.add('active');
            else if (screenNum === 2) navItems[1].classList.add('active');
            else if (screenNum === 4) navItems[2].classList.add('active');
            else if (screenNum === 18) navItems[3].classList.add('active');
        }
        
        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                goToScreen(currentScreen + 1);
            } else if (e.key === 'ArrowLeft') {
                goToScreen(currentScreen - 1);
            }
        });
        
        // 触摸滑动支持
        let touchStartX = 0;
        let touchEndX = 0;
        
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });
        
        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });
        
        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    // 向左滑 - 下一页
                    goToScreen(currentScreen + 1);
                } else {
                    // 向右滑 - 上一页
                    goToScreen(currentScreen - 1);
                }
            }
        }
    </script>
